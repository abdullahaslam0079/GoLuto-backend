# Render Blueprint: https://render.com/docs/blueprint-spec
# After connect: set GitHub repo, or use "Apply" from dashboard with this file.

databases:
  - name: goluto-db
    databaseName: goluto
    user: goluto
    plan: free

services:
  - type: web
    name: goluto-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    # Free tier: preDeployCommand is not supported — run migrations at startup instead.
    startCommand: python manage.py migrate --noinput && python manage.py ensure_superuser && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        fromDatabase:
          name: goluto-db
          property: connectionString
